version: "3.9"

services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-mistralai/mistral-small-3.2-24b-instruct}
      AGENTOPS_API_KEY: ${AGENTOPS_API_KEY:-}
    restart: unless-stopped
